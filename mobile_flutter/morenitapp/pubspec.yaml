name: morenitapp
description: "App de gestión de hermandad con Odoo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dio: ^5.0.3
  equatable: ^2.0.8

  # Archivos y Reportes (Excel/PDF)
  excel: ^4.0.6
  file_picker: ^11.0.2
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter

  # Gestión de Estado y Navegación
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  formz: ^0.8.0
  go_router: ^17.1.0

  # UI y Diseño
  google_fonts: ^8.0.2
  intl: ^0.20.2
  open_filex: ^4.7.0 # Movido aquí para poder abrir los PDF generados
  path_provider: ^2.1.5
  pdf: ^3.10.8
  printing: ^5.11.1
  shared_preferences: ^2.2.0
  table_calendar: ^3.1.2
  universal_html: ^2.3.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  image_picker: ^1.2.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/loaders/
    - assets/icono.png
    - google_fonts/montserrat_alternates/
