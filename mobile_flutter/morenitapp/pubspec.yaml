name: morenitapp
description: "App de gestión de hermandad con Odoo"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dio: ^5.0.3
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  formz: ^0.5.0+1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.2.0
  flutter_localizations: 
    sdk: flutter
  table_calendar: ^3.1.2
  excel: ^4.0.6
  path_provider: ^2.1.5
  universal_html: ^2.3.0

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/loaders/
    - assets/icono.png
    - google_fonts/montserrat_alternates/
