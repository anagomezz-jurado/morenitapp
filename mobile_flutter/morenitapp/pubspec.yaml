name: morenitapp
description: "App de gestión de hermandad con Odoo"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP para conectar con Odoo
  http: ^1.6.0

  # Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navegación
  go_router: ^17.1.0

  # ❗ SOLO si lo vas a usar de verdad
  formz: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/